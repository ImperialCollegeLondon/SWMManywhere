name: Dependabot and Pre-commit auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write  # Needed if in a private repository

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: false  # zeroclaw maintainer: bot workflow auto-merge disabled pending human review
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          # GitHub provides this variable in the CI env. You don't
          # need to add anything to the secrets vault.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
